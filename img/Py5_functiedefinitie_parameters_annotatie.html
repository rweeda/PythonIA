<svg width="100%" height="100%" viewBox="0 0 680 340" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Python functie-anatomie: parameters en argumenten</title>
  <desc>Diagram dat de anatomie van een Python-functie toont met parameters en argumenten.</desc>
  
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text font-size="12" font-family="sans-serif" x="48" y="18" fill="#534AB7" font-weight="500">### FUNCTIEDEFINITIE</text>

  <rect x="40" y="24" width="400" height="166" rx="12" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="6 3"/> <!-- purple  dotted rectangle om functiedefinitie -->

  <text font-size="14" font-family="monospace" x="60" y="62">
    <tspan fill="#CC5200">def </tspan><tspan fill="#1A6BAF">tekenDriehoek</tspan><tspan fill="#333333">(</tspan><tspan fill="#E65100">kleur, grootte</tspan><tspan fill="#333333">):</tspan>
  </text>
  
  <rect x="85" y="65" width="105" height="3" rx="1.5" fill="#1A6BAF" opacity="0.7"/> <!-- light blue under functienaam -->
  
  <rect x="200" y="65" width="105" height="3" rx="1.5" fill="#E65100" opacity="0.7"/> <!-- orange under parameters -->

  <text font-size="12" font-family="monospace" x="80" y="82"  fill="#666666">turtle.pencolor(<tspan fill="#E65100">kleur</tspan>)</text>
  <text font-size="12" font-family="monospace" x="80" y="100" fill="#666666">turtle.forward(<tspan fill="#E65100">grootte</tspan>)</text>
  <text font-size="12" font-family="monospace" x="80" y="118" fill="#666666">turtle.right(120)</text>
  <text font-size="12" font-family="monospace" x="80" y="136" fill="#666666">turtle.forward(<tspan fill="#E65100">grootte</tspan>)</text>
  <text font-size="12" font-family="monospace" x="80" y="154" fill="#666666">turtle.right(120)</text>
  <text font-size="12" font-family="monospace" x="80" y="172" fill="#666666">turtle.forward(<tspan fill="#E65100">grootte</tspan>)</text>

  <text font-size="12" font-family="sans-serif" x="48" y="228" fill="#0F6E56" font-weight="500">### HOOFDPROGRAMMA</text>

  <rect x="40" y="234" width="400" height="44" rx="12" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="6 3"/> <!-- green dotted rectangle om aanroep-->

  <text font-size="14" font-family="monospace" x="60" y="262">
    <tspan fill="#1A6BAF">tekenDriehoek</tspan><tspan fill="#333333">(</tspan><tspan fill="#E65100">"blue", 120</tspan><tspan fill="#333333">)</tspan>
  </text>
  
  <rect x="60" y="265" width="100" height="3" rx="1.5" fill="#1A6BAF" opacity="0.7"/> <!-- light blue under functienaam -->
  <rect x="165" y="265" width="90" height="3" rx="1.5" fill="#E65100" opacity="0.7"/> <!-- orange under argumenten -->

  <rect x="500" y="25" width="155" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" font-family="sans-serif" x="577" y="42" text-anchor="middle" fill="#0C447C">Functienaam</text>
  <path fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)" d="M500 62 L220 62"/>

  <rect x="500" y="96" width="160" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" font-family="sans-serif" x="580" y="123" text-anchor="middle" fill="#3C3489">Functiedefinitie</text>
  <path fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)" d="M500 118 L497 118"/>
  
  <rect x="500" y="152" width="155" height="44" rx="8" fill="#FFFBE6" stroke="#E65100" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" font-family="sans-serif" x="577" y="179" text-anchor="middle" fill="#7C2A0C">Parameters</text>
  <path fill="none" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrow)" d="M500 174 L485 174 L485 68 L328 68"/>

  <rect x="500" y="214" width="155" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" font-family="sans-serif" x="577" y="241" text-anchor="middle" fill="#085041">Functieaanroep</text>
  <path fill="none" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)" d="M500 236 L200 236"/>
  
  <rect x="500" y="268" width="155" height="44" rx="8" fill="#FFFBE6" stroke="#E65100" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" font-family="sans-serif" x="577" y="295" text-anchor="middle" fill="#7C2A0C">Argumenten</text>
  <path fill="none" stroke="#E65100" stroke-width="1.2" marker-end="url(#arrow)" d="M500 290 L305 290 L305 268"/>

</svg>
