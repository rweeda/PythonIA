<svg width="100%" viewBox="0 0 680 310" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Python functie-anatomie: definitie, naam en aanroep</title>
  <desc>Diagram dat de onderdelen van een Python-functie toont: functiedefinitie, functienaam en functieaanroep</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ### FUNCTIEDEFINITIE label -->
  <text font-size="12" font-family="sans-serif" x="48" y="18" fill="#534AB7" font-weight="500">### FUNCTIEDEFINITIE</text>

  <!-- Achtergrondblok: FUNCTIEDEFINITIE — bottom at y=172 (last text y=154 + 18px padding) -->
  <rect x="40" y="24" width="440" height="148" rx="12" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- Green comment line -->
  <text font-size="12" font-family="monospace" x="60" y="42" fill="#3a7a3a"># Tekent een gelijkzijdige driehoek</text>

  <!-- def line -->
  <text font-size="14" font-family="monospace" x="60" y="62">
    <tspan fill="#CC5200">def </tspan><tspan fill="#1A6BAF">tekenDriehoek</tspan><tspan fill="#333333">():</tspan>
  </text>

  <!-- turtle lines -->
  <text font-size="12" font-family="monospace" x="80" y="82"  fill="#666666">turtle.forward(100)</text>
  <text font-size="12" font-family="monospace" x="80" y="100" fill="#666666">turtle.right(120)</text>
  <text font-size="12" font-family="monospace" x="80" y="118" fill="#666666">turtle.forward(100)</text>
  <text font-size="12" font-family="monospace" x="80" y="136" fill="#666666">turtle.right(120)</text>
  <text font-size="12" font-family="monospace" x="80" y="154" fill="#666666">turtle.forward(100)</text>

  <!-- ### HOOFDPROGRAMMA label — 20px whitespace below purple rect (bottom=172) -->
  <text font-size="12" font-family="sans-serif" x="48" y="208" fill="#0F6E56" font-weight="500">### HOOFDPROGRAMMA</text>

  <!-- Achtergrondblok: HOOFDPROGRAMMA -->
  <rect x="40" y="214" width="440" height="44" rx="12" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="6 3"/>

  <!-- tekenDriehoek() aanroep -->
  <text font-size="14" font-family="monospace" x="60" y="237">
    <tspan fill="#1A6BAF">tekenDriehoek</tspan><tspan fill="#333333">()</tspan>
  </text>

  <!-- Label FUNCTIENAAM — straight arrow to def line y=62 -->
  <rect x="90" y="66" width="118" height="3" rx="1.5" fill="#1A6BAF" opacity="0.7"/>
  <rect x="500" y="40" width="155" height="44" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" font-family="sans-serif" x="577" y="67" text-anchor="middle" fill="#0C447C">Functienaam</text>
  <path fill="none" stroke="#185FA5" stroke-width="1.2" marker-end="url(#arrow)" d="M500 62 L220 62"/>

  <!-- Label FUNCTIEDEFINITIE -->
  <rect x="500" y="96" width="155" height="44" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" font-family="sans-serif" x="577" y="123" text-anchor="middle" fill="#3C3489">Functiedefinitie</text>
  <path fill="none" stroke="#534AB7" stroke-width="1.2" marker-end="url(#arrow)" d="M500 118 L482 118"/>

  <!-- Label FUNCTIEAANROEP -->
  <rect x="60" y="241" width="118" height="3" rx="1.5" fill="#1A6BAF" opacity="0.7"/>
  <rect x="500" y="214" width="155" height="44" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-size="14" font-weight="500" font-family="sans-serif" x="577" y="241" text-anchor="middle" fill="#085041">Functieaanroep</text>
  <path fill="none" stroke="#0F6E56" stroke-width="1.2" marker-end="url(#arrow)" d="M500 236 L190 236"/>

</svg>
