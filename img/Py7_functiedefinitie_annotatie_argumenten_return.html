<svg width="100%" viewBox="0 0 850 420" role="img" xmlns="http://www.w3.org/2000/svg">
<title>Python functie-anatomie: Return, Parameters en Argumenten</title>
<desc>Diagram dat de onderdelen van een Python-functie toont met parameters, argumenten en een return-waarde</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<text font-size="12" font-family="sans-serif" x="48" y="18" fill="#534AB7" font-weight="500">### FUNCTIEDEFINITIE</text>
<rect x="40" y="24" width="550" height="150" rx="12" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-dasharray="6 3"/>

<!-- definitiecommentaar-->
<text font-size="12" font-family="monospace" x="60" y="45" fill="#3a7a3a"># Opent een Lootbox en geeft de speler de item terug</text>


<text font-size="14" font-family="monospace" x="60" y="70">
<tspan fill="#CC5200">def </tspan><tspan fill="#1A6BAF">open_lootbox</tspan><tspan fill="#333333">(</tspan><tspan fill="#d97706">spelernaam</tspan><tspan fill="#333333">):</tspan>
</text>

<rect x="95" y="75" width="95" height="3" rx="1.5" fill="#1A6BAF" opacity="0.7"/> <!-- blue line in functiedefinitie -->


<rect x="194" y="75" width="70" height="3" rx="1.5" fill="#E65100" opacity="0.7"/>

<text font-size="12" font-family="monospace" x="80" y="95">
<tspan fill="#333333">gevonden_item = </tspan><tspan fill="#059669">"zwaard"</tspan>
</text>

<text font-size="12" font-family="monospace" x="80" y="115">
<tspan fill="#333333">print(...)</tspan>
</text>

<text font-size="14" font-family="monospace" x="80" y="145">
<tspan fill="#CC5200" font-weight="bold">return </tspan><tspan fill="#333333">gevonden_item</tspan>
</text>

<rect x="135" y="150" width="100" height="3" rx="1.5" fill="#DB2777" opacity="0.7"/>

<text font-size="12" font-family="sans-serif" x="48" y="225" fill="#0F6E56" font-weight="500">### HOOFDPROGRAMMA</text>
<rect x="40" y="231" width="380" height="65" rx="12" fill="none" stroke="#0F6E56" stroke-width="1.5" stroke-dasharray="6 3"/>

<text font-size="14" font-family="monospace" x="60" y="263">
<tspan fill="#9333EA">mijn_item</tspan><tspan fill="#333333"> = </tspan><tspan fill="#1A6BAF">open_lootbox</tspan><tspan fill="#333333">(</tspan><tspan fill="#059669" font-weight="bold">"Sam"</tspan><tspan fill="#333333">)</tspan>
</text>
